<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaunchSpark AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f8fc;
      color: #1f2937;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .badge {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.1;
    }

    p.subtitle {
      margin: 0 0 30px;
      font-size: 18px;
      color: #6b7280;
    }

    .input-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      min-width: 240px;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    button {
      padding: 14px 22px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .result-box {
      margin-top: 20px;
      padding: 24px;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      min-height: 120px;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 16px;
    }

    .section-title {
      font-weight: bold;
      color: #111827;
      display: block;
      margin-top: 14px;
      margin-bottom: 4px;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }

    .loading {
      color: #4f46e5;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">AI Startup Tool</div>
    <h1>LaunchSpark AI</h1>
    <p class="subtitle">Turn rough ideas into startup concepts with problem, solution, and revenue model.</p>

    <div class="input-group">
      <input id="idea" type="text" placeholder="Enter your startup idea..." />
      <button onclick="generate()">Generate</button>
    </div>

    <div id="result" class="result-box">Your result will appear here.</div>

    <div class="footer">
      Powered by OpenAI
    </div>
  </div>

  <script>
    function formatResult(text) {
      if (!text) return "No response returned.";

      return text
        .replace(/\*\*(Problem:?)\*\*/gi, '<span class="section-title">$1</span>')
        .replace(/\*\*(Solution:?)\*\*/gi, '<span class="section-title">$1</span>')
        .replace(/\*\*(Revenue Model:?)\*\*/gi, '<span class="section-title">$1</span>')
        .replace(/\n/g, "<br>");
    }

    async function generate() {
      const idea = document.getElementById("idea").value.trim();
      const result = document.getElementById("result");

      if (!idea) {
        result.innerHTML = "Please enter an idea first.";
        return;
      }

      result.innerHTML = '<span class="loading">Generating your startup idea...</span>';

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ idea })
        });

        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = data.error || "Something went wrong.";
          return;
        }

        result.innerHTML = formatResult(data.result);
      } catch (error) {
        result.innerHTML = "Request failed.";
      }
    }
  </script>
</body>
</html>
