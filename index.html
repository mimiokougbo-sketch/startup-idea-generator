<script>
async function generate() {
  const idea = document.getElementById("idea").value.trim();
  const result = document.getElementById("result");
  const message = document.getElementById("message");
  const generateBtn = document.getElementById("generateBtn");

  message.textContent = "";

  if (!idea) {
    result.textContent = "Please enter an idea first.";
    return;
  }

  result.innerHTML = "Generating startup ideas...";
  generateBtn.disabled = true;
  generateBtn.textContent = "Generating...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ idea })
    });

    const data = await res.json();

    if (!res.ok) {
      result.textContent = data.error || "Something went wrong.";
      return;
    }

    result.textContent = data.result || "No response returned.";
  } catch (error) {
    result.textContent = "Request failed.";
  } finally {
    generateBtn.disabled = false;
    generateBtn.textContent = "Generate";
  }
}

function copyResult() {
  const result = document.getElementById("result").innerText;
  const message = document.getElementById("message");

  navigator.clipboard.writeText(result);
  message.textContent = "Result copied successfully.";
}

function clearResult() {
  document.getElementById("idea").value = "";
  document.getElementById("result").textContent = "Your result will appear here.";
  document.getElementById("message").textContent = "";
}

function downloadResult() {
  const result = document.getElementById("result").innerText;
  const blob = new Blob([result], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "launchspark-startup-idea.txt";
  a.click();

  URL.revokeObjectURL(url);

  const message = document.getElementById("message");
  message.textContent = "Download started.";
}

function shareTwitter() {
  const result = document.getElementById("result").innerText;

  const text = encodeURIComponent(
    "I just generated a startup idea using LaunchSpark AI 🚀\n\n" +
    result.slice(0, 200) +
    "...\n\nTry it here:"
  );

  const url = encodeURIComponent(window.location.href);

  window.open(
    `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
    "_blank"
  );
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);

  const message = document.getElementById("message");
  message.textContent = "Link copied. Share it with others!";
}
</script>
