<!DOCTYPE html>
<html>
<head>
  <title>Startup Idea Generator</title>
</head>

<body>

<h1>Startup Idea Generator</h1>

<input id="idea" placeholder="Enter startup idea" />

<button onclick="generate()">Generate</button>

<p id="result"></p>

<script>
async function generate() {

  const idea = document.getElementById("idea").value;
  const result = document.getElementById("result");

  result.innerText = "Generating...";

  try {

    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ idea })
    });

    const data = await res.json();

    if (!res.ok) {
      result.innerText = data.error || "Something went wrong.";
      return;
    }

    result.innerText = data.result;

  } catch (error) {

    result.innerText = "Request failed.";

  }

}
</script>

</body>
</html>
